name: Generate Catppuccin Wallpapers

on:
  push:
    paths:
      - "original-walls/**"
      - ".github/workflows/generate-catppuccin-walls.yml"
      - "scripts/generate-catppuccin.sh"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install gowall
        run: go install github.com/Achno/gowall@latest

      - name: Generate Catppuccin wallpapers
        env:
          UPSCALE_SCALE: "2"
          UPSCALE_MODEL: "realesrgan-x4plus"
          UPSCALE_STRICT: "false"
        run: |
          export PATH="$PATH:$HOME/go/bin"
          bash ./scripts/generate-catppuccin.sh

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -d catppuccin-walls ]]; then
            shopt -s nullglob
            files=(catppuccin-walls/*.png catppuccin-walls/*.jpg catppuccin-walls/*.jpeg catppuccin-walls/*.webp)
            [[ ${#files[@]} -gt 0 ]] && git add -- "${files[@]}"
            shopt -u nullglob
          fi
          if ! git diff --cached --quiet --exit-code; then
            git commit -m "chore: regenerate catppuccin wallpapers"
            git push
          else
            echo "No changes to commit."
          
          fi